# CBSA dbb-app.yaml — DBB 3.x zBuilder Build Definition
#
# This file is an ILLUSTRATIVE reference implementation of the CBSA build
# using IBM DBB 3.x zBuilder declarative YAML syntax.
#
# It is the modern equivalent of the zAppBuild Groovy scripts + .properties files
# in CBSA/application-conf/. Both approaches produce identical z/OS load modules.
#
# Migration from zAppBuild:
#   1. Run: $DBB_HOME/migration/bin/migrateGroovy.sh build.groovy <args> --preview
#   2. Review the generated YAML and replace resolved values with ${HLQ}, ${WORKSPACE}
#   3. Incorporate the deploy-tasks section (not generated by the migration utility)
#
# Documentation: https://www.ibm.com/docs/en/adffz/dbb/3.0.x
# See also: docs/docs/modernization/zappbuild-vs-dbb-yaml.md

application:
  name: CBSA
  # High-level qualifier for all z/OS datasets — override at pipeline invocation
  hlq: ${HLQ}
  # Workspace root on USS
  workspace: ${WORKSPACE}

# ── DATASET DECLARATIONS ─────────────────────────────────────────────────────
# Equivalent to: CBSA/application-conf/application.properties HLQ references
# and CBSA/application-conf/bind.properties dataset names

datasets:
  # Copybook library — SYSLIB for COBOL compile
  copylib:
    name: "${HLQ}.COBOL.COPYLIB"
    type: PDS
    recfm: FB
    lrecl: 80
    blksize: 32720

  # CICS load module output library
  cicsload:
    name: "${HLQ}.CICSLOAD"
    type: PDSE
    recfm: U
    blksize: 32760

  # Non-CICS load module output library
  load:
    name: "${HLQ}.LOAD"
    type: PDSE
    recfm: U
    blksize: 32760

  # DB2 DBRM library — populated by SQL precompiler
  dbrm:
    name: "${HLQ}.DB2DBRM"
    type: PDS
    recfm: FB
    lrecl: 80

  # COBOL object deck library
  objlib:
    name: "${HLQ}.COBOBJS.OBJ"
    type: PDS
    recfm: FB
    lrecl: 80

  # Sysdebug for IBM Debugger dwarf information
  sysdebug:
    name: "${HLQ}.COBOL.SYSDEBUG"
    type: PDSE
    recfm: FB
    lrecl: 1024

  # zUnit playback files
  zunitpb:
    name: "${HLQ}.ZUNIT.PB"
    type: PDS
    recfm: FB
    lrecl: 80

# ── LANGUAGE TASKS ───────────────────────────────────────────────────────────

language-tasks:

  # ── 1. BMS MAPS ──────────────────────────────────────────────────────────
  # Must run before cobol-compile — BMS generates DSECT copybooks used by COBOL.
  # Equivalent to: CBSA/application-conf/BMS.properties
  # Build order: BMS.groovy runs first in zAppBuild buildOrder

  - name: bms-compile
    type: bms
    source-files:
      - pattern: "CBSA/bms/*.bms"
    options:
      # Generate map load module: SYSPARM(MAP),DECK,NOOBJECT
      compile-params: "SYSPARM(MAP),DECK,NOOBJECT"
      # Generate DSECT copybook: SYSPARM(DSECT),DECK,NOOBJECT
      copy-gen-params: "SYSPARM(DSECT),DECK,NOOBJECT"
      link-edit-params: "MAP,RENT,COMPAT(PM5)"
    datasets:
      syslmod: "${HLQ}.CICSLOAD"
      # DSECT copybooks written to copylib for use by COBOL compile
      syslib:
        - "${HLQ}.COBOL.COPYLIB"
    max-rc: 4

  # ── 2. COBOL COMPILE + LINK-EDIT ─────────────────────────────────────────
  # Equivalent to: CBSA/application-conf/Cobol.properties
  # Handles IS_CICS, IS_SQL, IS_DLI flags (built-in zBuilder variables)

  - name: cobol-compile
    type: cobol
    dependsOn:
      - bms-compile          # BMS must complete before COBOL (DSECT copybooks)
    source-files:
      - pattern: "CBSA/cobol/*.cbl"
        # Exclude test case programs — handled by zunit-run task
        exclude:
          - pattern: "CBSA/testcase/*.cbl"
    options:
      compiler-version: V6
      # Base compile parameters — LIB enables COPY statement processing
      compile-params: LIB
      # CICS translator parameters — appended when IS_CICS == true
      cics-compile-params: "CICS"
      # DB2 precompiler parameters — appended when IS_SQL == true
      sql-compile-params: "SQL"
      # Error feedback for IDz user build
      error-prefix-params: "ADATA,EX(ADX(ELAXMGUX))"
      # IBM Debugger — TEST option embeds dwarf info in load module
      debug-params: "TEST"
      # Link-edit options
      link-edit-params: "MAP,RENT,COMPAT(PM5)"
      # Store abbreviated Git hash in SSI field of load module
      store-ssi: true
      # Scan load module for link dependencies (impact analysis)
      scan-load-module: true
    datasets:
      syslib:
        - "${HLQ}.COBOL.COPYLIB"
        - "CEE.SCEESAMP"            # COBOL runtime samples
      # CICS programs go to CICSLOAD (IS_CICS == true)
      cics-syslmod: "${HLQ}.CICSLOAD"
      # Non-CICS programs go to LOAD
      syslmod: "${HLQ}.LOAD"
      # DB2 DBRM output for SQL programs (IS_SQL == true)
      dbrmlib: "${HLQ}.DB2DBRM"
      # Debug information
      sysdebug: "${HLQ}.COBOL.SYSDEBUG"
    max-rc:
      compile: 4
      link-edit: 0

  # ── 3. ASSEMBLER (DFHNCOPT) ──────────────────────────────────────────────
  # Equivalent to: CBSA/application-conf/Assembler.properties
  # Builds the CICS Named Counter options table

  - name: asm-compile
    type: assembler
    source-files:
      - pattern: "CBSA/asm/*.assemble"
    options:
      compile-params: "OBJECT,NODECK,NOESD,NORLD,NOXREF"
      link-edit-params: "MAP,RENT,COMPAT(PM5)"
    datasets:
      syslib:
        - "SYS1.MACLIB"
        - "CICSTS55.CICS.SDFHMAC"    # CICS macro library — adjust version to site
      syslmod: "${HLQ}.CICSLOAD"
    max-rc: 4

  # ── 4. LINK-EDIT (link cards) ────────────────────────────────────────────
  # Equivalent to: CBSA/application-conf/LinkEdit.properties
  # For programs with hand-crafted link-edit control cards in CBSA/linkedit/

  - name: link-edit
    type: linkedit
    source-files:
      - pattern: "CBSA/linkedit/*.lked"
    options:
      link-edit-params: "MAP,RENT,COMPAT(PM5)"
    datasets:
      syslib:
        - "${HLQ}.CICSLOAD"
        - "${HLQ}.LOAD"
      syslmod: "${HLQ}.CICSLOAD"
    max-rc: 0

  # ── 5. ZUNIT TEST EXECUTION ──────────────────────────────────────────────
  # Equivalent to: CBSA/application-conf/ZunitConfig.properties
  # Runs after all compile tasks complete

  - name: zunit-run
    type: zunit
    dependsOn:
      - cobol-compile
    source-files:
      - pattern: "CBSA/testcfg/*.bzucfg"
    options:
      # Test case COBOL programs (compiled with NODLL,NODYNAM,TEST,NOCICS,NOSQL)
      testcase-compile-params: "NODLL,NODYNAM,TEST(NOSEP),NOCICS,NOSQL,PGMN(LU)"
      # zUnit runner parameters
      bzuplay-params: "STOP=E,REPORT=XML"
    datasets:
      # Playback files
      sysplay: "${HLQ}.ZUNIT.PB"
      # Test case load library (separate from production CICSLOAD)
      syslmod: "${HLQ}.ZUNIT.LOAD"
      syslib:
        - "${HLQ}.COBOL.COPYLIB"
        - "${HLQ}.CICSLOAD"
    max-rc:
      pass: 4
      warn: 8
      # RC > 8 = test failure

# ── DEPLOY TASKS ─────────────────────────────────────────────────────────────
# z/OS Connect EE artifact deployment
# This section has no equivalent in zAppBuild — it was previously done manually.

deploy-tasks:

  # ── z/OS Connect EE SAR/AAR Deployment ───────────────────────────────────
  # Copies the pre-built service archives (SAR) and API archives (AAR) to the
  # z/OS Connect EE Liberty server resource directories via USS file operations.
  #
  # Prerequisites:
  #   - z/OS Connect EE 2.0 server running on USS at ${ZOSCONNECT_HOME}
  #   - SAR files in sarfiles/ and AAR files in aarfiles/ have been built
  #     by the z/OS Connect EE API Toolkit or Build Toolkit
  #
  # z/OS Connect EE directory structure:
  #   ${ZOSCONNECT_HOME}/resources/
  #     zosconnect/
  #       services/   ← SAR files deployed here
  #       apis/       ← AAR files deployed here

  - name: zosconnect-deploy
    type: shell
    description: Deploy z/OS Connect EE SAR and AAR artifacts to Liberty server
    dependsOn:
      - cobol-compile      # CICS programs must be installed before service activation
    steps:
      # Deploy Service Archives (SAR) — one per CICS program
      - name: deploy-sar-files
        command: |
          echo "Deploying SAR files to z/OS Connect EE server..."
          SAR_SOURCE="${WORKSPACE}/sarfiles"
          SAR_TARGET="${ZOSCONNECT_HOME}/resources/zosconnect/services"
          for sar in ${SAR_SOURCE}/*.sar; do
            service=$(basename ${sar} .sar)
            echo "  Deploying service: ${service}"
            cp "${sar}" "${SAR_TARGET}/${service}.sar"
          done
          echo "SAR deployment complete."

      # Deploy API Archives (AAR) — one per API
      - name: deploy-aar-files
        command: |
          echo "Deploying AAR files to z/OS Connect EE server..."
          AAR_SOURCE="${WORKSPACE}/aarfiles"
          AAR_TARGET="${ZOSCONNECT_HOME}/resources/zosconnect/apis"
          for aar in ${AAR_SOURCE}/*.aar; do
            api=$(basename ${aar} .aar)
            echo "  Deploying API: ${api}"
            cp "${aar}" "${AAR_TARGET}/${api}.aar"
          done
          echo "AAR deployment complete."

      # Verify deployment — list deployed services via z/OS Connect EE admin API
      - name: verify-deployment
        command: |
          echo "Verifying z/OS Connect EE service availability..."
          ADMIN_URL="http://localhost:${ZOSCONNECT_HTTP_PORT}/zosConnect/services"
          curl -s -u "${ZOSCONNECT_USER}:${ZOSCONNECT_PASSWORD}" \
               -H "Accept: application/json" \
               "${ADMIN_URL}" | grep -c '"name"' || true
          echo "Verification complete. Check output for service count."

    environment:
      # Override these at pipeline invocation or set in ~/.profile
      ZOSCONNECT_HOME:
        description: "Root directory of z/OS Connect EE Liberty server"
        default: "/opt/zosconnect/servers/cbsa"
      ZOSCONNECT_HTTP_PORT:
        description: "z/OS Connect EE HTTP admin port"
        default: "30701"
      ZOSCONNECT_USER:
        description: "z/OS Connect EE admin user"
        default: "ibmuser"
      ZOSCONNECT_PASSWORD:
        description: "z/OS Connect EE admin password — set via pipeline secret"
        default: ""
